name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r requirements-dev.lock
      - run: python -m pip install -e . --no-deps
      - run: ruff check robinhood_tools scripts tests
      - run: mypy robinhood_tools
      - run: coverage run -m unittest discover -s tests
      - run: coverage report
      - run: python scripts/secret_scan.py
      - run: pip-audit -r requirements-dev.lock
      - run: python -m json.tool config/approval_routes.example.json >/dev/null
